<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鞍山中考化学·知识点诊断测试</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
:root {
  --primary: #E85D04;
  --primary-light: #FFF3E6;
  --success: #22C55E;
  --success-light: #F0FDF4;
  --error: #EF4444;
  --error-light: #FEF2F2;
  --warning: #F59E0B;
  --warning-light: #FFFBEB;
  --text: #1E293B;
  --text-secondary: #64748B;
  --bg: #F8FAFC;
  --card: #FFFFFF;
  --border: #E2E8F0;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  padding-bottom: env(safe-area-inset-bottom);
}

.header {
  background: var(--primary);
  color: white;
  padding: 16px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title { font-size: 17px; font-weight: 600; }
.header-meta { font-size: 13px; opacity: 0.85; margin-top: 4px; display: flex; justify-content: space-between; align-items: center; }
.timer { font-variant-numeric: tabular-nums; background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 20px; font-size: 13px; }

.progress-bar { height: 3px; background: rgba(255,255,255,0.3); }
.progress-fill { height: 100%; background: white; transition: width 0.3s ease; }

.question-container { padding: 16px; max-width: 600px; margin: 0 auto; }

.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 16px;
  display: none;
}
.question-card.active { display: block; }

.q-number {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.q-badge {
  background: var(--primary-light);
  color: var(--primary);
  font-size: 12px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 6px;
}
.q-difficulty {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
}
.q-difficulty.basic { background: var(--success-light); color: var(--success); }
.q-difficulty.medium { background: var(--warning-light); color: var(--warning); }
.q-difficulty.hard { background: var(--error-light); color: var(--error); }

.q-subject {
  font-size: 12px;
  color: var(--text-secondary);
}

.q-text {
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 16px;
  word-break: break-word;
}

.options { display: flex; flex-direction: column; gap: 10px; }
.option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s ease;
  font-size: 15px;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
}
.option:active { transform: scale(0.98); }
.option.selected { border-color: var(--primary); background: var(--primary-light); }
.option-letter {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  flex-shrink: 0;
  margin-top: 1px;
}
.option.selected .option-letter { background: var(--primary); color: white; }

.fill-input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 16px;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}
.fill-input:focus { border-color: var(--primary); }
.fill-hint { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

.nav-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  padding: 12px 16px;
  max-width: 600px;
  margin: 0 auto;
}
.nav-dot {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--text-secondary);
}
.nav-dot.active { border-color: var(--primary); background: var(--primary); color: white; }
.nav-dot.answered { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
.nav-dot.correct { border-color: var(--success); background: var(--success); color: white; }
.nav-dot.wrong { border-color: var(--error); background: var(--error); color: white; }

.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 10px 20px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 100;
}
.bottom-row-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.btn {
  padding: 10px 24px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.btn:active { transform: scale(0.96); }
.btn-outline { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
.btn-primary { background: var(--primary); color: white; }
.btn-submit { background: var(--success); color: white; display: none; width: 100%; padding: 12px; font-size: 16px; text-align: center; }
.btn-submit.show { display: block; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.answer-count { font-size: 13px; color: var(--text-secondary); }

.results-page {
  display: none;
  padding: 20px 16px;
  max-width: 600px;
  margin: 0 auto;
}
.results-page.show { display: block; }

.score-card {
  background: var(--card);
  border-radius: 16px;
  padding: 32px 24px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  margin-bottom: 20px;
}
.score-ring {
  width: 140px;
  height: 140px;
  margin: 0 auto 20px;
  position: relative;
}
.score-ring svg { transform: rotate(-90deg); }
.score-ring circle {
  fill: none;
  stroke-width: 10;
  stroke-linecap: round;
}
.score-ring .bg { stroke: var(--border); }
.score-ring .fg { transition: stroke-dashoffset 1s ease; }
.score-number {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 36px;
  font-weight: 700;
}
.score-label { font-size: 14px; color: var(--text-secondary); }

.stats-row {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}
.stat-item {
  flex: 1;
  background: var(--card);
  border-radius: 12px;
  padding: 16px 12px;
  text-align: center;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.stat-value { font-size: 24px; font-weight: 700; }
.stat-value.correct-color { color: var(--success); }
.stat-value.wrong-color { color: var(--error); }
.stat-value.time-color { color: var(--primary); }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

.diagnosis-section { margin-bottom: 20px; }
.diagnosis-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; padding: 0 4px; }
.diagnosis-item {
  background: var(--card);
  border-radius: 10px;
  padding: 12px 16px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.diagnosis-topic { font-size: 14px; font-weight: 500; }
.diagnosis-bar-wrap {
  width: 120px;
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
  margin: 0 12px;
  flex-shrink: 0;
}
.diagnosis-bar {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
}
.diagnosis-score { font-size: 13px; font-weight: 600; min-width: 48px; text-align: right; }

.review-section { margin-bottom: 20px; }
.review-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; padding: 0 4px; }

.review-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.review-toggle-btn {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-secondary);
}
.review-toggle-btn.active {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 500;
}

.review-item {
  background: var(--card);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--border);
}
.review-item.correct { border-left-color: var(--success); }
.review-item.wrong { border-left-color: var(--error); }

.review-q { font-size: 14px; margin-bottom: 8px; color: var(--text-secondary); }
.review-answer { font-size: 15px; font-weight: 500; }
.review-answer.correct-text { color: var(--success); }
.review-answer.wrong-text { color: var(--error); }
.review-explain {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
  line-height: 1.6;
}

.result-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 20px;
  padding-bottom: 20px;
}
.btn-copy {
  background: var(--primary);
  color: white;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}
.btn-copy:active { opacity: 0.8; }
.btn-retry {
  background: var(--bg);
  color: var(--text);
  padding: 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  font-size: 16px;
  cursor: pointer;
  font-family: inherit;
}

.copy-hint {
  text-align: center;
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background: rgba(0,0,0,0.75);
  color: white;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 15px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

.start-page {
  padding: 40px 20px;
  max-width: 600px;
  margin: 0 auto;
  text-align: center;
}
.start-card {
  background: var(--card);
  border-radius: 16px;
  padding: 32px 24px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.start-icon { font-size: 48px; margin-bottom: 16px; }
.start-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.start-info { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.8; }
.start-info span { display: block; }
.btn-start {
  background: var(--primary);
  color: white;
  padding: 14px 48px;
  border-radius: 12px;
  border: none;
  font-size: 17px;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}

.name-input-wrap {
  margin-bottom: 20px;
}
.name-input {
  width: 100%;
  max-width: 260px;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 16px;
  text-align: center;
  outline: none;
  transition: border-color 0.15s;
  font-family: inherit;
}
.name-input:focus { border-color: var(--primary); }
.name-input::placeholder { color: #CBD5E1; }

.btn-notebook {
  background: var(--bg);
  color: var(--text);
  padding: 14px 48px;
  border-radius: 12px;
  border: 1px solid var(--border);
  font-size: 16px;
  cursor: pointer;
  font-family: inherit;
  margin-top: 12px;
}
.btn-notebook:active { opacity: 0.8; }
.notebook-badge {
  display: inline-block;
  background: var(--error);
  color: white;
  font-size: 11px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 10px;
  margin-left: 6px;
  vertical-align: middle;
}

.notebook-page {
  display: none;
  padding: 20px 16px;
  max-width: 600px;
  margin: 0 auto;
}
.notebook-page.show { display: block; }

.notebook-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding: 0 4px;
}
.notebook-header-title {
  font-size: 18px;
  font-weight: 600;
}
.btn-back {
  background: var(--bg);
  color: var(--text);
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}
.btn-back:active { opacity: 0.8; }

.notebook-empty {
  text-align: center;
  padding: 48px 20px;
  color: var(--text-secondary);
  font-size: 15px;
}
.notebook-empty-icon { font-size: 40px; margin-bottom: 12px; }

.nb-item {
  background: var(--card);
  border-radius: 10px;
  padding: 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
  border-left: 4px solid var(--error);
}
.nb-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.nb-item-meta {
  font-size: 12px;
  color: var(--text-secondary);
}
.nb-item-actions {
  display: flex;
  gap: 6px;
}
.nb-btn {
  padding: 4px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 12px;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-secondary);
}
.nb-btn:active { opacity: 0.7; }
.nb-btn.mastered { border-color: var(--success); color: var(--success); background: var(--success-light); }
.nb-btn.delete { border-color: var(--error); color: var(--error); background: var(--error-light); }
.nb-item-q { font-size: 14px; color: var(--text); margin-bottom: 6px; line-height: 1.6; }
.nb-item-answer { font-size: 13px; color: var(--text-secondary); }
.nb-item-answer span { font-weight: 500; }
.nb-item-explain {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed var(--border);
  line-height: 1.6;
}
.nb-item.mastered-item { border-left-color: var(--success); opacity: 0.7; }

.nb-filter {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.nb-filter-btn {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-secondary);
}
.nb-filter-btn.active {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 500;
}

@media (max-width: 380px) {
  .nav-dots { gap: 5px; padding: 10px 12px; }
  .nav-dot { width: 28px; height: 28px; font-size: 12px; border-radius: 6px; }
  .question-container { padding: 12px; }
  .question-card { padding: 16px; }
  .q-text { font-size: 15px; }
  .option { padding: 12px 14px; font-size: 14px; gap: 10px; }
  .option-letter { width: 22px; height: 22px; font-size: 12px; }
  .bottom-bar { padding: 10px 12px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
  .btn { padding: 9px 16px; font-size: 14px; }
  .header { padding: 14px 16px; }
  .start-page { padding: 24px 16px; }
  .start-card { padding: 24px 20px; }
  .score-ring { width: 120px; height: 120px; }
  .score-number { font-size: 30px; }
  .stat-item { padding: 12px 8px; }
  .stat-value { font-size: 20px; }
  .fill-input { padding: 12px 14px; font-size: 15px; }
  .diagnosis-bar-wrap { width: 80px; }
}

@media (min-width: 768px) {
  .question-container, .results-page, .start-page, .nav-dots { max-width: 680px; }
  .q-text { font-size: 17px; line-height: 1.9; }
  .option { font-size: 16px; padding: 16px 18px; }
  .question-card { padding: 24px; }
  .start-card { padding: 40px 32px; }
  .score-card { padding: 40px 32px; }
}

@media (min-width: 1024px) {
  .question-container, .results-page, .start-page, .nav-dots { max-width: 720px; }
  body { padding-bottom: 0; }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div id="startPage" class="start-page">
  <div class="start-card">
    <div class="start-icon">📝</div>
    <div class="start-title" id="startTitle">鞍山中考化学·知识点诊断测试</div>
    <div class="start-info" id="startInfo">
      <span>科目：化学（九年级）</span>
      <span>题数：20 题（随机组卷）</span>
      <span>用时：约 20-30 分钟</span>
      <span>每次测试从48题题库中随机抽取，覆盖12个知识点</span>
      <span>完成后复制结果发送给教练即可自动分析</span>
    </div>
    <div class="name-input-wrap">
      <input class="name-input" id="studentNameInput" type="text" placeholder="输入你的姓名" maxlength="20">
    </div>
    <button class="btn-start" onclick="startQuiz()">开始答题</button>
    <br>
    <button class="btn-notebook" id="btnNotebook" onclick="showNotebook()" style="display:none">📓 错题本<span class="notebook-badge" id="notebookBadge">0</span></button>
  </div>
</div>

<div id="quizPage" style="display:none">
  <div class="header">
    <div class="header-title" id="headerTitle">鞍山中考化学·知识点诊断测试</div>
    <div class="header-meta">
      <span id="headerSubject">化学（九年级）</span>
      <span class="timer" id="timer">00:00</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="question-container" id="questionContainer"></div>

  <div class="nav-dots" id="navDots"></div>

  <div class="bottom-bar">
    <div class="bottom-row-nav">
      <button class="btn btn-outline" id="btnPrev" onclick="prevQuestion()">上一题</button>
      <span class="answer-count" id="answerCount">已答 0/19</span>
      <button class="btn btn-primary" id="btnNext" onclick="nextQuestion()">下一题</button>
    </div>
    <button class="btn btn-submit" id="btnSubmit" onclick="submitQuiz()">📩 交卷</button>
  </div>
</div>

<div id="resultsPage" class="results-page">
  <div class="score-card">
    <div class="score-ring">
      <svg width="140" height="140">
        <circle class="bg" cx="70" cy="70" r="60"></circle>
        <circle class="fg" id="scoreRing" cx="70" cy="70" r="60"
          stroke-dasharray="377" stroke-dashoffset="377"></circle>
      </svg>
      <div class="score-number" id="scoreNumber">0%</div>
    </div>
    <div class="score-label" id="scoreLabel">计算中...</div>
  </div>

  <div class="stats-row">
    <div class="stat-item">
      <div class="stat-value correct-color" id="statCorrect">0</div>
      <div class="stat-label">正确</div>
    </div>
    <div class="stat-item">
      <div class="stat-value wrong-color" id="statWrong">0</div>
      <div class="stat-label">错误</div>
    </div>
    <div class="stat-item">
      <div class="stat-value time-color" id="statTime">00:00</div>
      <div class="stat-label">用时</div>
    </div>
  </div>

  <div class="diagnosis-section">
    <div class="diagnosis-title">知识点诊断</div>
    <div id="diagnosisList"></div>
  </div>

  <div class="review-section">
    <div class="review-title">答题详情</div>
    <div class="review-toggle">
      <button class="review-toggle-btn active" onclick="toggleReview('all', this)">全部</button>
      <button class="review-toggle-btn" onclick="toggleReview('wrong', this)">仅错题</button>
    </div>
    <div id="reviewList"></div>
  </div>

  <div class="result-actions">
    <button class="btn-copy" onclick="copyResults()">📋 复制结果发送给教练</button>

const QUESTIONS_BY_TOPIC = {"物质的分类": [{"id": 1, "subject": "化学", "topic": "物质的分类", "difficulty": "basic", "type": "choice", "text": "下列物质中，属于纯净物的是", "answer": "A", "explain": "纯净物是由一种物质组成的。蒸馏水只含有H2O一种物质，是纯净物。空气由氮气、氧气、稀有气体、二氧化碳等多种物质组成，是混合物。石灰水是氢氧化钙的水溶液，属于混合物。海水中含有氯化钠、氯化镁等多种物质，是混合物。", "options": ["A. 蒸馏水", "B. 空气", "C. 石灰水", "D. 海水"], "source": "AI出题"}, {"id": 2, "subject": "化学", "topic": "物质的分类", "difficulty": "basic", "type": "choice", "text": "下列物质中，属于氧化物的是", "answer": "C", "explain": "氧化物是由两种元素组成，其中一种是氧元素的化合物。A选项O2只有一种元素，是单质不是氧化物。B选项KMnO4含有K、Mn、O三种元素，不是氧化物。C选项H2O由氢和氧两种元素组成，是氧化物。D选项NaOH含有Na、O、H三种元素，不是氧化物。", "options": ["A. O2", "B. KMnO4", "C. H2O", "D. NaOH"], "source": "AI出题"}, {"id": 3, "subject": "化学", "topic": "物质的分类", "difficulty": "hard", "type": "choice", "text": "下列各组物质中，分类完全正确的是", "answer": "C", "explain": "A选项中分类正确但题目要求分类完全正确，空气和矿泉水确实是混合物，氧气和蒸馏水确实是纯净物，但A选项的分类不够完整。B选项中食盐水是混合物，不是化合物。C选项中氧气和铜是单质，干冰(CO2)和水(H2O)是氧化物，碳酸钙(CaCO3)是盐，分类完全正确。D选项高锰酸钾(KMnO4)含三种元素，不是氧化物。", "options": ["A. 混合物：空气、矿泉水；纯净物：氧气、蒸馏水", "B. 单质：铁、金刚石；化合物：二氧化碳、食盐水", "C. 单质：氧气、铜；氧化物：干冰、水；盐：碳酸钙", "D. 混合物：海水、石灰石；氧化物：五氧化二磷、高锰酸钾"], "source": "AI出题"}, {"id": 4, "subject": "化学", "topic": "物质的分类", "difficulty": "basic", "type": "fill", "text": "将下列物质进行分类（填序号）：①空气 ②铜 ③二氧化碳 ④高锰酸钾 ⑤水。其中属于混合物的是____；属于单质的是____；属于氧化物的是____。", "answer": "①；②；③⑤", "explain": "①空气由氮气、氧气等多种物质组成，是混合物。②铜由铜元素一种元素组成的纯净物，是单质。③二氧化碳由碳和氧两种元素组成，是氧化物。④高锰酸钾(KMnO4)由K、Mn、O三种元素组成，是化合物中的盐，不是氧化物。⑤水由氢和氧两种元素组成，是氧化物。", "acceptAlso": ["①|②|③⑤", "①|②|③和⑤", "①|②|⑤③"], "source": "AI出题"}], "微观粒子与化学式": [{"id": 5, "subject": "化学", "topic": "微观粒子与化学式", "difficulty": "basic", "type": "choice", "text": "下列关于分子、原子、离子的说法中，正确的是", "answer": "B", "explain": "A选项错误：分子是保持物质'化学性质'的最小粒子，而非所有性质（如物理性质）。B选项正确：在化学变化中，分子可以再分为原子，但原子不能再分，原子是化学变化中的最小粒子。C选项错误：原子不一定比分子小，如铁原子就比氢分子大。D选项错误：原子可以直接构成物质，如金属、金刚石等都是由原子直接构成的。", "options": ["A. 分子是保持物质性质的最小粒子", "B. 原子在化学变化中不可再分", "C. 原子一定比分子小", "D. 原子不能直接构成物质"], "source": "AI出题"}, {"id": 6, "subject": "化学", "topic": "微观粒子与化学式", "difficulty": "basic", "type": "choice", "text": "下列关于原子结构的说法中，正确的是", "answer": "B", "explain": "A选项错误：质子数不一定等于中子数，如普通氢原子有1个质子、0个中子。B选项正确：原子的最外层电子数决定了原子在化学反应中的得失电子行为，因此决定了元素的化学性质。C选项错误：普通氢原子核内只有质子没有中子。D选项错误：带电的粒子不一定是离子，也可能是质子、电子等。", "options": ["A. 原子中质子数一定等于中子数", "B. 原子的最外层电子数决定元素的化学性质", "C. 原子核内一定含有中子", "D. 带电的粒子一定是离子"], "source": "AI出题"}, {"id": 7, "subject": "化学", "topic": "微观粒子与化学式", "difficulty": "hard", "type": "choice", "text": "下列化学用语中，\"2\"的含义表示正确的是", "answer": "B", "explain": "A选项错误：元素只讲种类不讲个数，2H表示2个氢原子，不能说2个氢元素。B选项正确：H2O中右下角的2表示每个水分子中含有2个氢原子。C选项错误：Ca2+中的2表示每个钙离子带2个单位正电荷，不是化合价。D选项错误：Fe2+是亚铁离子（带2个单位正电荷的铁离子），不是铁离子(Fe3+)，2Fe2+表示2个亚铁离子。", "options": ["A. 2H——2个氢元素", "B. H2O——水分子中含有2个氢原子", "C. Ca2+——钙元素的化合价为+2价", "D. 2Fe2+——2个铁离子"], "source": "AI出题"}, {"id": 8, "subject": "化学", "topic": "微观粒子与化学式", "difficulty": "basic", "type": "fill", "text": "用化学用语填空：\n（1）2个氧原子____；\n（2）3个水分子____；\n（3）4个钠离子____；\n（4）地壳中含量最多的金属元素____。", "answer": "（1）2O （2）3H2O （3）4Na+ （4）Al", "explain": "（1）原子用元素符号表示，个数写在元素符号前面，2个氧原子写作2O。（2）分子用化学式表示，个数写在化学式前面，3个水分子写作3H2O。（3）离子用离子符号表示，钠离子为Na+，4个钠离子写作4Na+。（4）地壳中含量最多的元素是氧，含量最多的金属元素是铝(Al)。", "acceptAlso": ["2O|3H2O|4Na+|Al", "2O|3H₂O|4Na⁺|Al"], "source": "AI出题"}, {"id": 9, "subject": "化学", "topic": "微观粒子与化学式", "difficulty": "medium", "type": "fill", "text": "写出下列符号中\"2\"的含义：\n（1）2Mg____；\n（2）Mg2+____；\n（3）2CO____。", "answer": "（1）2个镁原子 （2）每个镁离子带2个单位正电荷 （3）2个一氧化碳分子", "explain": "（1）元素符号前面的数字表示原子个数，2Mg中的2表示2个镁原子。（2）元素符号右上角的数字表示每个离子所带的电荷数，Mg2+中的2表示每个镁离子带2个单位正电荷。（3）化学式前面的数字表示分子个数，2CO中的2表示2个一氧化碳分子。", "source": "AI出题"}], "化学方程式": [{"id": 10, "subject": "化学", "topic": "化学方程式", "difficulty": "basic", "type": "choice", "text": "下列化学方程式书写正确的是", "answer": "B", "explain": "A选项错误：镁燃烧生成氧化镁(MgO)，不是MgO2，且未配平，正确写法为2Mg + O2 ==(点燃) 2MgO。B选项正确：铁在氧气中燃烧生成四氧化三铁，方程式已配平，条件标注正确。C选项错误：碳在充足氧气中燃烧需要标注条件\"点燃\"。D选项错误：过氧化氢分解需要催化剂(MnO2)，且未配平，正确写法为2H2O2 ==(MnO2) 2H2O + O2↑。", "options": ["A. Mg + O2 == MgO2", "B. 3Fe + 2O2 ==(点燃) Fe3O4", "C. C + O2 == CO2", "D. H2O2 == H2O + O2"], "source": "AI出题"}, {"id": 11, "subject": "化学", "topic": "化学方程式", "difficulty": "basic", "type": "choice", "text": "对于化学方程式2H2 + O2 ==(点燃) 2H2O的理解，下列说法错误的是", "answer": "C", "explain": "A选项正确：化学方程式的读法之一就是描述反应物、条件和生成物。B选项正确：根据质量守恒定律，化学反应前后元素种类不变。C选项错误：反应前分子是H2和O2，反应后分子是H2O，分子种类发生了改变；反应前共有3个分子(2个H2和1个O2)，反应后有2个H2O分子，分子总数也改变了。D选项正确：根据质量守恒定律，化学反应前后原子种类和数目都不变。", "options": ["A. 氢气和氧气在点燃条件下生成水", "B. 反应前后元素种类不变", "C. 反应前后分子种类和分子总数都不变", "D. 反应前后原子种类和数目都不变"], "source": "AI出题"}, {"id": 12, "subject": "化学", "topic": "化学方程式", "difficulty": "medium", "type": "choice", "text": "配平化学方程式：C2H5OH + xO2 ==(点燃) 2CO2 + 3H2O，则x的值为", "answer": "C", "explain": "根据质量守恒定律，反应前后各原子数目相等。右边：C原子=2，H原子=3×2=6，O原子=2×2+3×1=7。左边：C原子=2（已满足），H原子=5+1=6（已满足），O原子=1+2x。令1+2x=7，解得x=3。", "options": ["A. 1", "B. 2", "C. 3", "D. 4"], "source": "AI出题"}, {"id": 13, "subject": "化学", "topic": "化学方程式", "difficulty": "basic", "type": "fill", "text": "写出下列反应的化学方程式：\n（1）实验室用双氧水制氧气：____；\n（2）碳在充足的氧气中充分燃烧：____；\n（3）石灰石与稀盐酸反应：____。", "answer": "（1）2H2O2 ==(MnO2) 2H2O + O2↑ （2）C + O2 ==(点燃) CO2 （3）CaCO3 + 2HCl == CaCl2 + H2O + CO2↑", "explain": "（1）双氧水(H2O2)在二氧化锰(MnO2)催化下分解为水和氧气。（2）碳在充足氧气中完全燃烧生成二氧化碳。（3）碳酸钙与稀盐酸反应生成氯化钙、水和二氧化碳，这是实验室制取CO2的反应原理。", "source": "AI出题"}, {"id": 14, "subject": "化学", "topic": "化学方程式", "difficulty": "medium", "type": "fill", "text": "配平下列化学方程式：\n（1）____CO + ____Fe2O3 ==(高温) ____Fe + ____CO2\n（2）____Al + ____H2SO4 == ____Al2(SO4)3 + ____H2↑", "answer": "（1）3、1、2、3 （2）2、3、1、3", "explain": "（1）用观察法配平：Fe2O3中有2个Fe，所以Fe前配2；Fe2O3中有3个O，每个CO变成CO2需要1个O，所以CO前配3，CO2前配3。验证：左边3C、2Fe、3O+3O=6O，右边2Fe、3C、6O，配平正确。（2）Al2(SO4)3中有2个Al和3个SO4，所以Al前配2、H2SO4前配3、H2前配3。验证：左边2Al、6H、3S、12O，右边2Al、3S、12O、6H，配平正确。", "acceptAlso": ["3CO+1Fe2O3==2Fe+3CO2|2Al+3H2SO4==1Al2(SO4)3+3H2↑"], "source": "AI出题"}], "溶液": [{"id": 15, "subject": "化学", "topic": "溶液", "difficulty": "basic", "type": "choice", "text": "下列关于溶液的说法中，正确的是", "answer": "B", "explain": "A选项错误：溶液不一定是无色的，如硫酸铜溶液是蓝色的，氯化亚铁溶液是浅绿色的。B选项正确：溶液的基本特征就是均一性和稳定性。C选项错误：溶质可以是固体（如NaCl）、液体（如酒精）或气体（如CO2溶于水）。D选项错误：饱和溶液不一定是浓溶液，如Ca(OH)2的溶解度很小，其饱和溶液浓度很低，是稀溶液。", "options": ["A. 溶液一定是无色透明的", "B. 溶液是均一、稳定的混合物", "C. 溶液中的溶质只能是固体", "D. 饱和溶液一定是浓溶液"], "source": "AI出题"}, {"id": 16, "subject": "化学", "topic": "溶液", "difficulty": "hard", "type": "choice", "text": "t℃时，某物质的溶解度为30g。下列说法正确的是", "answer": "B", "explain": "溶解度30g表示t℃时100g水中最多溶解30g该物质。A选项错误：100g水中溶解30g溶质得到130g饱和溶液，而非100g溶液含30g溶质。B选项正确：50g水最多溶解15g该物质(30g×50/100=15g)，加入20g只能溶解15g，得到50+15=65g溶液。C选项错误：对于溶解度随温度升高而降低的物质（如Ca(OH)2），升高温度反而会使饱和溶液析出晶体。D选项错误：溶质质量分数=30/(100+30)×100%≈23.1%，不是30%。", "options": ["A. t℃时，100g该物质的饱和溶液中含有30g溶质", "B. t℃时，将20g该物质加入50g水中，充分搅拌后得到65g溶液", "C. 升高温度一定能使该物质的饱和溶液变为不饱和溶液", "D. t℃时，该物质的饱和溶液中溶质质量分数为30%"], "source": "AI出题"}, {"id": 17, "subject": "化学", "topic": "溶液", "difficulty": "basic", "type": "choice", "text": "配制50g质量分数为6%的NaCl溶液，下列说法正确的是", "answer": "C", "explain": "A选项错误：需要NaCl的质量=50g×6%=3g，不是6g。B选项错误：需要水的质量=50g-3g=47g，即47mL，应选用50mL量筒（略大于所需体积的最小规格），用100mL量筒误差太大。C选项正确：配制溶液时用玻璃棒搅拌可以加速溶质的溶解。D选项错误：配制溶液的步骤应为计算、称量（称NaCl）、量取（量水）、溶解。", "options": ["A. 需要NaCl的质量为6g", "B. 量取水时应选用100mL的量筒", "C. 玻璃棒的作用是搅拌，加速溶解", "D. 配制溶液的步骤为计算、量取、溶解"], "source": "AI出题"}, {"id": 18, "subject": "化学", "topic": "溶液", "difficulty": "medium", "type": "fill", "text": "20℃时，KNO3的溶解度为31.6g。\n（1）20℃时，将20g KNO3加入50g水中，充分溶解后，所得溶液的质量为____g。\n（2）要使接近饱和的KNO3溶液变为饱和溶液，可采用的方法有____（写出一种即可）。", "answer": "（1）65.8 （2）加入KNO3（或蒸发溶剂/降低温度）", "explain": "（1）20℃时KNO3溶解度为31.6g，即100g水中最多溶解31.6g。50g水中最多溶解31.6×(50/100)=15.8g。加入20g KNO3，只能溶解15.8g，有4.2g未溶解。所得溶液质量=50+15.8=65.8g。（2）使接近饱和的溶液变为饱和溶液的方法：加入溶质、蒸发溶剂、降低温度（对大多数物质而言）。", "acceptAlso": ["65.8|加溶质", "65.8|加入KNO3", "65.8|蒸发溶剂", "65.8|降低温度", "65.8|加硝酸钾", "65.8|蒸发水"], "source": "AI出题"}, {"id": 19, "subject": "化学", "topic": "溶液", "difficulty": "basic", "type": "fill", "text": "生理盐水是医疗上常用的溶液，其溶质是____（填化学式），配制步骤为计算、____、量取、溶解。", "answer": "NaCl；称量", "explain": "生理盐水是0.9%的氯化钠溶液，溶质是NaCl（氯化钠）。配制一定溶质质量分数的溶液，步骤为：计算（算出所需溶质和溶剂的量）、称量（用天平称取固体溶质）、量取（用量筒量取液体溶剂）、溶解（将溶质和溶剂混合并搅拌溶解）。", "acceptAlso": ["氯化钠|称量", "NaCl|称", "氯化钠|称"], "source": "AI出题"}], "酸碱盐": [{"id": 20, "subject": "化学", "topic": "酸碱盐", "difficulty": "basic", "type": "choice", "text": "下列物质中，属于碱的是", "answer": "B", "explain": "碱是指电离时产生的阴离子全部是OH-的化合物。A选项纯碱(Na2CO3)电离产生Na+和CO32-，属于盐，不是碱（名称带\"碱\"但化学分类是盐）。B选项烧碱(NaOH)电离产生Na+和OH-，属于碱。C选项生石灰(CaO)是氧化物。D选项石灰石(CaCO3)主要成分是碳酸钙，属于盐。", "options": ["A. 纯碱(Na2CO3)", "B. 烧碱(NaOH)", "C. 生石灰(CaO)", "D. 石灰石(CaCO3)"], "source": "AI出题"}, {"id": 21, "subject": "化学", "topic": "酸碱盐", "difficulty": "medium", "type": "choice", "text": "下列各组物质混合后，能产生沉淀的是", "answer": "C", "explain": "A选项：NaOH+HCl==NaCl+H2O，中和反应生成可溶的NaCl和水，无沉淀。B选项：Na2CO3+2HCl==2NaCl+H2O+CO2↑，产生气泡（气体），无沉淀。C选项：CuSO4+2NaOH==Cu(OH)2↓+Na2SO4，生成蓝色沉淀Cu(OH)2。D选项：NaCl和KNO3不反应（不满足复分解反应条件，没有沉淀、气体或水生成）。", "options": ["A. NaOH溶液与稀盐酸", "B. Na2CO3溶液与稀盐酸", "C. CuSO4溶液与NaOH溶液", "D. NaCl溶液与KNO3溶液"], "source": "AI出题"}, {"id": 22, "subject": "化学", "topic": "酸碱盐", "difficulty": "hard", "type": "choice", "text": "除去NaCl溶液中混有的少量Na2CO3，下列方法正确的是", "answer": "A", "explain": "除杂原则：除去杂质的同时不能引入新的杂质。A选项正确：Na2CO3+2HCl==2NaCl+H2O+CO2↑，将Na2CO3转化为NaCl，不引入新杂质。B选项错误：Na2CO3+2NaOH不反应（两者都是碱性），无法除去Na2CO3，且引入NaOH杂质。C选项错误：Na2CO3+CuCl2==CuCO3↓+2NaCl，虽能除去Na2CO3但引入新杂质CuCl2（过量的话）。D选项错误：Na2CO3+H2SO4==Na2SO4+H2O+CO2↑，引入了新杂质Na2SO4。", "options": ["A. 加入适量稀盐酸，至不再产生气泡为止", "B. 加入适量NaOH溶液", "C. 加入适量CuCl2溶液，过滤", "D. 加入适量稀硫酸"], "source": "AI出题"}, {"id": 23, "subject": "化学", "topic": "酸碱盐", "difficulty": "basic", "type": "fill", "text": "胃酸的主要成分是____（填名称）；农业上常用____（填化学式）来改良酸性土壤。", "answer": "盐酸；Ca(OH)2", "explain": "胃酸的主要成分是盐酸(HCl)，帮助消化食物。农业上常用熟石灰(氢氧化钙，化学式Ca(OH)2)来改良酸性土壤，利用其碱性中和土壤中的酸性物质。不能用NaOH，因为NaOH碱性太强且有强腐蚀性，会伤害土壤结构。", "acceptAlso": ["盐酸|Ca(OH)2", "盐酸|氢氧化钙", "HCl|Ca(OH)2", "HCl|氢氧化钙", "稀盐酸|Ca(OH)2", "稀盐酸|氢氧化钙"], "source": "AI出题"}], "常见气体": [{"id": 24, "subject": "化学", "topic": "常见气体", "difficulty": "basic", "type": "choice", "text": "下列关于氧气的说法中，错误的是", "answer": "B", "explain": "A选项正确：氧气能支持燃烧（助燃性），炼钢时需要高温，利用氧气助燃可以提高炉温。B选项错误：氧气本身不能燃烧，不具有可燃性，只具有助燃性，因此不能用作燃料。C选项正确：空气中氧气的体积分数约为21%（注意是体积分数而非质量分数）。D选项正确：氧气能使带火星的木条复燃，这是检验氧气的常用方法。", "options": ["A. 氧气能支持燃烧，可用于炼钢", "B. 氧气可以燃烧，可用作燃料", "C. 空气中氧气的体积分数约为21%", "D. 可以用带火星的木条检验氧气"], "source": "AI出题"}, {"id": 25, "subject": "化学", "topic": "常见气体", "difficulty": "basic", "type": "choice", "text": "下列关于CO2的说法中，错误的是", "answer": "B", "explain": "A选项正确：CO2无毒但不能供给呼吸，在CO2浓度过高的环境中会因缺氧而窒息。B选项错误：CO2本身不能使干燥的石蕊试纸变红，CO2需要与水反应生成碳酸(H2CO3)，碳酸才能使紫色石蕊试液变红。干燥的CO2不具有酸性。C选项正确：CO2灭火的原理是隔绝氧气（不燃烧也不支持燃烧）且覆盖在可燃物表面（密度比空气大）。D选项正确：CO2+Ca(OH)2==CaCO3↓+H2O，生成白色CaCO3沉淀使石灰水变浑浊，这是检验CO2的方法。", "options": ["A. CO2不能供给呼吸，但本身无毒", "B. CO2能使干燥的紫色石蕊试纸变红", "C. CO2能用于灭火，是因为它不燃烧也不支持燃烧，且密度比空气大", "D. CO2能使澄清石灰水变浑浊"], "source": "AI出题"}, {"id": 26, "subject": "化学", "topic": "常见气体", "difficulty": "medium", "type": "choice", "text": "实验室收集CO2气体时，可以采用的方法是", "answer": "D", "explain": "CO2密度比空气大，可以用向上排空气法收集。CO2虽然能溶于水（1体积水约溶解1体积CO2），但溶解量不大，在实验室中也可以用排水法收集，且排水法收集的气体更纯净。实际上初中阶段通常认为CO2能溶于水，一般用向上排空气法收集，但严格来说排水法也是可行的。", "options": ["A. 只能用向上排空气法", "B. 只能用排水法", "C. 只能用向下排空气法", "D. 既能用向上排空气法，也能用排水法"], "source": "AI出题"}, {"id": 27, "subject": "化学", "topic": "常见气体", "difficulty": "basic", "type": "fill", "text": "实验室制取CO2常用的药品是____和____（填名称），反应的化学方程式为____。", "answer": "大理石（或石灰石）；稀盐酸；CaCO3 + 2HCl == CaCl2 + H2O + CO2↑", "explain": "实验室制取CO2常用大理石（或石灰石，主要成分CaCO3）和稀盐酸反应。不用稀硫酸是因为生成的CaSO4微溶于水，会覆盖在石灰石表面阻止反应继续进行。不用浓盐酸是因为浓盐酸易挥发，使制得的CO2中混有HCl气体。化学方程式为CaCO3+2HCl==CaCl2+H2O+CO2↑。", "acceptAlso": ["石灰石|稀盐酸|CaCO3+2HCl==CaCl2+H2O+CO2↑", "石灰石|稀盐酸|CaCO3 + 2HCl == CaCl2 + H2O + CO2↑"], "source": "AI出题"}, {"id": 28, "subject": "化学", "topic": "常见气体", "difficulty": "basic", "type": "fill", "text": "氢气是最清洁的燃料，其原因是____（写一条即可），反应的化学方程式为____。", "answer": "燃烧产物是水，无污染（或热值高）；2H2 + O2 ==(点燃) 2H2O", "explain": "氢气燃烧的化学方程式为2H2+O2==(点燃)2H2O。氢气作为燃料的优点：（1）燃烧产物是水，不产生任何污染物，是最清洁的燃料；（2）氢气的热值高，相同质量下放出的热量最多。", "acceptAlso": ["产物无污染|2H2+O2==(点燃)2H2O", "燃烧产物是水|2H2+O2==(点燃)2H2O", "无污染|2H2+O2==(点燃)2H2O", "热值高|2H2+O2==(点燃)2H2O"], "source": "AI出题"}], "化学实验基本操作": [{"id": 29, "subject": "化学", "topic": "化学实验基本操作", "difficulty": "basic", "type": "choice", "text": "下列实验操作中，正确的是", "answer": "C", "explain": "A选项错误：熄灭酒精灯应该用灯帽盖灭，不能用嘴吹灭，以免火焰进入灯内引起危险。B选项错误：量筒读数时视线应与凹液面最低处保持水平，俯视读数会偏大（实际液体体积偏小），仰视读数会偏小（实际液体体积偏大）。C选项正确：托盘天平使用时遵循\"左物右码\"原则。D选项错误：实验剩余药品不能放回原瓶（以免污染原瓶中的药品），也不能随意丢弃，应放入指定的回收容器中。", "options": ["A. 用嘴吹灭酒精灯", "B. 用量筒量取液体时，俯视读数", "C. 称量药品时，左盘放物品，右盘放砝码", "D. 实验剩余的药品放回原瓶"], "source": "AI出题"}, {"id": 30, "subject": "化学", "topic": "化学实验基本操作", "difficulty": "medium", "type": "choice", "text": "加热50mL液体时，需要用到下列仪器中的\n①试管 ②烧杯 ③酒精灯 ④铁架台 ⑤石棉网 ⑥量筒", "answer": "B", "explain": "加热50mL液体，液体量较多，应使用烧杯（试管只能盛放少量液体，一般不超过试管容积的1/3）。加热需要酒精灯提供热源，用铁架台固定烧杯，烧杯加热时需要垫石棉网使受热均匀，防止烧杯炸裂。量筒用于量取液体，不是加热时需要的仪器。因此需要②烧杯、③酒精灯、④铁架台、⑤石棉网。", "options": ["A. ①③④", "B. ②③④⑤", "C. ①③④⑤", "D. ②③④⑤⑥"], "source": "AI出题"}, {"id": 31, "subject": "化学", "topic": "化学实验基本操作", "difficulty": "basic", "type": "choice", "text": "下列实验安全操作中，不正确的是", "answer": "D", "explain": "A选项正确：浓硫酸沾到皮肤上应立即用大量水冲洗（稀释并冲走硫酸），再涂弱碱性碳酸氢钠溶液中和残余酸。B选项正确：NaOH沾到皮肤上用水冲洗后涂弱酸性硼酸溶液中和。C选项正确：湿抹布可以隔绝氧气来灭火。D选项错误：稀释浓硫酸时，必须将浓硫酸沿容器壁缓慢注入水中，并用玻璃棒不断搅拌。绝不能将水注入浓硫酸中，因为水的密度比浓硫酸小，水会浮在浓硫酸表面，溶解时放出大量热使水沸腾飞溅，非常危险。口诀：酸入水，沿器壁，慢慢倒，不断搅。", "options": ["A. 不慎将浓硫酸沾到皮肤上，立即用大量水冲洗，再涂上3%~5%的碳酸氢钠溶液", "B. 不慎将NaOH溶液沾到皮肤上，立即用大量水冲洗，再涂上硼酸溶液", "C. 酒精灯不慎碰倒起火，立即用湿抹布盖灭", "D. 配制稀硫酸时，将水沿容器壁缓慢注入浓硫酸中"], "source": "AI出题"}], "金属与金属活动性": [{"id": 32, "subject": "化学", "topic": "金属与金属活动性", "difficulty": "basic", "type": "choice", "text": "下列金属中，活动性最强的是", "answer": "D", "explain": "根据金属活动性顺序表：K Ca Na Mg Al Zn Fe Sn Pb (H) Cu Hg Ag Pt Au。铝(Al)排在锌(Zn)、铁(Fe)、铜(Cu)的前面，位置越靠前活动性越强，因此铝的活动性最强。", "options": ["A. 铜", "B. 锌", "C. 铁", "D. 铝"], "source": "AI出题"}, {"id": 33, "subject": "化学", "topic": "金属与金属活动性", "difficulty": "basic", "type": "choice", "text": "下列事实中，能说明锌的活动性比铜强的是", "answer": "A", "explain": "判断金属活动性强弱的依据是化学性质（能否与酸或盐溶液反应），而非物理性质。A选项正确：锌能与稀硫酸反应(Zn+H2SO4==ZnSO4+H2↑)说明锌排在氢前面，铜不能与稀硫酸反应说明铜排在氢后面，因此锌的活动性比铜强。B、C、D选项涉及的都是物理性质（密度、熔点、颜色），与金属活动性无关。", "options": ["A. 锌能与稀硫酸反应产生气泡，铜不能", "B. 锌的密度比铜小", "C. 锌的熔点比铜低", "D. 锌的颜色比铜浅"], "source": "AI出题"}, {"id": 34, "subject": "化学", "topic": "金属与金属活动性", "difficulty": "hard", "type": "choice", "text": "将一定量的铁粉加入AgNO3和Cu(NO3)2的混合溶液中，充分反应后过滤。向滤渣中加入稀盐酸，有气泡产生。则滤渣中一定含有的物质是", "answer": "C", "explain": "根据金属活动性顺序：Fe>Cu>Ag，铁优先与AgNO3反应(Fe+2AgNO3==Fe(NO3)2+2Ag)，AgNO3反应完后再与Cu(NO3)2反应(Fe+Cu(NO3)2==Fe(NO3)2+Cu)。向滤渣中加稀盐酸有气泡产生，说明滤渣中有铁（Fe+2HCl==FeCl2+H2↑），即铁粉过量。铁过量说明AgNO3和Cu(NO3)2已完全反应，因此滤渣中一定含有Ag、Cu和剩余的Fe。", "options": ["A. 只有Ag", "B. Ag和Cu", "C. Ag、Cu和Fe", "D. Cu和Fe"], "source": "AI出题"}, {"id": 35, "subject": "化学", "topic": "金属与金属活动性", "difficulty": "basic", "type": "fill", "text": "写出下列反应的化学方程式：\n（1）铝制品在空气中不易被腐蚀的原因是铝与氧气反应生成一层致密的薄膜：____；\n（2）波尔多液（含CuSO4）不能用铁桶配制的原因：____。", "answer": "（1）4Al + 3O2 == 2Al2O3 （2）Fe + CuSO4 == FeSO4 + Cu", "explain": "（1）铝在常温下就能与氧气反应，生成致密的氧化铝(Al2O3)薄膜覆盖在铝表面，阻止内部的铝继续被氧化，这就是铝制品耐腐蚀的原因。（2）铁的活动性比铜强，铁能置换出硫酸铜溶液中的铜：Fe+CuSO4==FeSO4+Cu，这样会腐蚀铁桶，同时使波尔多液失效。", "source": "AI出题"}, {"id": 36, "subject": "化学", "topic": "金属与金属活动性", "difficulty": "medium", "type": "fill", "text": "有A、B、C三种金属，将B放入A的盐溶液中，B表面有固体析出；将A放入C的盐溶液中，A表面有固体析出。则三种金属的活动性由强到弱的顺序是____。", "answer": "B > A > C", "explain": "判断金属活动性强弱的方法：活动性强的金属能将活动性弱的金属从其盐溶液中置换出来。B放入A的盐溶液中，B表面有固体A析出，说明B的活动性比A强(B>A)。A放入C的盐溶液中，A表面有固体C析出，说明A的活动性比C强(A>C)。综合得出活动性顺序：B>A>C。", "acceptAlso": ["B>A>C", "B、A、C", "B A C"], "source": "AI出题"}], "化学与生活": [{"id": 37, "subject": "化学", "topic": "化学与生活", "difficulty": "basic", "type": "choice", "text": "下列变化中，属于化学变化的是", "answer": "B", "explain": "化学变化的特征是有新物质生成。A选项冰雪融化只是状态变化（固态变液态），没有新物质生成，是物理变化。B选项粮食酿酒过程中，粮食中的淀粉经过发酵转化为酒精（乙醇），有新物质生成，是化学变化。C选项玻璃破碎只是形状变化，没有新物质生成，是物理变化。D选项矿石粉碎只是大小变化，没有新物质生成，是物理变化。", "options": ["A. 冰雪融化", "B. 粮食酿酒", "C. 玻璃破碎", "D. 矿石粉碎"], "source": "AI出题"}, {"id": 38, "subject": "化学", "topic": "化学与生活", "difficulty": "basic", "type": "choice", "text": "下列做法中，有利于保护环境的是", "answer": "C", "explain": "A选项错误：大量使用农药和化肥会污染土壤和水体，应合理使用。B选项错误：废旧电池中含有汞、镉等重金属，随意丢弃会严重污染土壤和地下水，应回收处理。C选项正确：煤中含有的硫燃烧会生成SO2，SO2是形成酸雨的主要物质，使用脱硫煤可以减少SO2排放，有利于保护环境。D选项错误：工业废水含有有害物质，直接排入河流会污染水体，应处理达标后再排放。", "options": ["A. 大量使用农药和化肥以提高粮食产量", "B. 将废旧电池随意丢弃", "C. 使用脱硫煤减少SO2的排放", "D. 将工业废水直接排入河流"], "source": "AI出题"}], "化学计算": [{"id": 39, "subject": "化学", "topic": "化学计算", "difficulty": "basic", "type": "choice", "text": "H2O的相对分子质量为", "answer": "B", "explain": "相对分子质量等于化学式中各原子的相对原子质量之和。H2O的相对分子质量 = 1×2 + 16 = 18。其中H的相对原子质量为1，O的相对原子质量为16。", "options": ["A. 16", "B. 18", "C. 20", "D. 36"], "source": "AI出题"}, {"id": 40, "subject": "化学", "topic": "化学计算", "difficulty": "hard", "type": "choice", "text": "下列说法中，正确的是", "answer": "A", "explain": "A选项正确：H2O中氢元素和氧元素的质量比=(1×2):16=2:16=1:8。B选项错误：相对分子质量是一个比值，单位为\"1\"（通常省略），不能加\"g\"。CO的相对分子质量=12+16=28，不是28g。C选项错误：一个氧原子的质量约为16×1.66×10^(-27)kg≈2.656×10^(-26)kg，远不是16g。16是氧的相对原子质量。D选项错误：NH4NO3中氮元素的质量分数=(14×2)/(14+4+16×3+14+1)×100%=28/80×100%=35%，不是28%。", "options": ["A. H2O中氢元素和氧元素的质量比为1:8", "B. CO的相对分子质量为28g", "C. 一个氧原子的质量为16g", "D. NH4NO3中氮元素的质量分数为28%"], "source": "AI出题"}, {"id": 41, "subject": "化学", "topic": "化学计算", "difficulty": "medium", "type": "choice", "text": "在反应2Mg + O2 ==(点燃) 2MgO中，镁、氧气、氧化镁的质量比为", "answer": "C", "explain": "根据化学方程式2Mg+O2==(点燃)2MgO，各物质的质量=化学计量数×相对分子（原子）质量。Mg的质量=2×24=48，O2的质量=1×32=32，MgO的质量=2×(24+16)=2×40=80。质量比=48:32:80=3:2:5。A选项2:1:2是化学计量数之比，不是质量比。B选项没有乘以化学计量数。D选项48:32:80没有化简。", "options": ["A. 2:1:2", "B. 24:32:40", "C. 3:2:5", "D. 48:32:80"], "source": "AI出题"}, {"id": 42, "subject": "化学", "topic": "化学计算", "difficulty": "basic", "type": "fill", "text": "NH4NO3的相对分子质量为____，其中氮元素的质量分数为____。", "answer": "80；35%", "explain": "NH4NO3的相对分子质量=14+1×4+16×3+14+1×1=14+4+48+14+1=81... 不对，重新计算：NH4NO3由一个NH4+和一个NO3-组成，即N:2个、H:4个、O:3个。相对分子质量=14×2+1×4+16×3=28+4+48=80。氮元素质量分数=(14×2)/80×100%=28/80×100%=35%。", "acceptAlso": ["80|35%", "80|0.35"], "source": "AI出题"}], "水的净化与组成": [{"id": 43, "subject": "化学", "topic": "水的净化与组成", "difficulty": "basic", "type": "choice", "text": "下列关于水的说法中，正确的是", "answer": "C", "explain": "A选项错误：地球上水资源总量虽大，但淡水资源只占约2.53%，且分布不均匀，很多地区面临缺水问题，应节约用水。B选项错误：过滤只能除去水中的不溶性杂质（如泥沙），不能除去可溶性钙镁化合物，因此不能降低水的硬度。降低水的硬度的方法有煮沸（生活中）和蒸馏（实验室）。C选项正确：电解水时正极产生氧气，负极产生氢气，体积比约为1:2。D选项错误：自来水厂净水过程中，沉淀和过滤是物理变化，但消毒（如加氯气杀菌）是化学变化。", "options": ["A. 地球上水资源丰富，取之不尽用之不竭", "B. 过滤可以降低水的硬度", "C. 电解水时，正极产生的气体是氧气", "D. 自来水厂的净水过程只包含物理变化"], "source": "AI出题"}, {"id": 44, "subject": "化学", "topic": "水的净化与组成", "difficulty": "basic", "type": "choice", "text": "下列净水方法中，净化程度最高的是", "answer": "D", "explain": "各种净水方法的净化程度：沉淀→使较大颗粒的不溶性杂质沉降；过滤→除去不溶性杂质；吸附→除去色素和异味（如活性炭吸附）；蒸馏→将水加热蒸发再冷凝，可以除去水中几乎所有杂质（包括可溶性杂质），得到蒸馏水（接近纯水）。因此蒸馏是净化程度最高的方法。", "options": ["A. 沉淀", "B. 过滤", "C. 吸附", "D. 蒸馏"], "source": "AI出题"}, {"id": 45, "subject": "化学", "topic": "水的净化与组成", "difficulty": "basic", "type": "fill", "text": "电解水时，正极产生的气体是____，负极产生的气体是____，两者的体积比约为____。该实验说明水是由____组成的。", "answer": "氧气（O2）；氢气（H2）；1:2；氢元素和氧元素", "explain": "电解水实验：正极产生氧气(O2)，负极产生氢气(H2)，体积比O2:H2=1:2（记忆口诀：正氧负氢，氧一氢二）。该实验中水在通电条件下分解为氢气和氧气，根据质量守恒定律，反应前后元素种类不变，生成物中含有氢元素和氧元素，说明水是由氢元素和氧元素组成的化合物。", "acceptAlso": ["O2|H2|1:2|氢元素和氧元素", "氧气|氢气|1:2|氢元素和氧元素", "O2|H2|1∶2|氢元素和氧元素", "氧气|氢气|1:2|氢、氧两种元素", "氧气|氢气|1:2|氢氧两种元素"], "source": "AI出题"}], "燃烧与灭火": [{"id": 46, "subject": "化学", "topic": "燃烧与灭火", "difficulty": "basic", "type": "choice", "text": "炒菜时油锅着火，最合适的灭火方法是", "answer": "B", "explain": "A选项错误：油的密度比水小，油会浮在水面上继续燃烧，而且水会使油溅出扩大火势，非常危险。B选项正确：用锅盖盖住油锅可以隔绝氧气（空气），使火熄灭，这是最简单有效的灭火方法。C选项错误：用扇子扇会提供更多空气（氧气），反而使火势更大。D选项错误：加入冷油不能灭火，反而增加了可燃物的量。", "options": ["A. 用水浇灭", "B. 用锅盖盖灭", "C. 用扇子扇灭", "D. 加入冷油"], "source": "AI出题"}, {"id": 47, "subject": "化学", "topic": "燃烧与灭火", "difficulty": "basic", "type": "choice", "text": "用灯帽盖灭酒精灯和用嘴吹灭蜡烛，其灭火原理分别是", "answer": "D", "explain": "燃烧的三个条件：可燃物、与氧气（空气）接触、温度达到着火点。灭火的原理就是破坏其中任一条件。用灯帽盖灭酒精灯：灯帽盖住后隔绝了空气（氧气），酒精灯因缺少氧气而熄灭，原理是隔绝氧气。用嘴吹灭蜡烛：吹气加速了空气流动，带走了蜡烛火焰周围的热量，使温度降低到蜡烛的着火点以下而熄灭，原理是降低温度到着火点以下。注意：着火点是物质的固有属性，一般不会改变。", "options": ["A. 都是隔绝氧气", "B. 都是降低温度到着火点以下", "C. 前者降低温度到着火点以下，后者隔绝氧气", "D. 前者隔绝氧气，后者降低温度到着火点以下"], "source": "AI出题"}, {"id": 48, "subject": "化学", "topic": "燃烧与灭火", "difficulty": "basic", "type": "fill", "text": "用水灭火的原理是____；森林火灾时开辟隔离带的灭火原理是____。", "answer": "降低温度到可燃物的着火点以下；清除可燃物（或隔离可燃物）", "explain": "灭火的三种基本原理：（1）隔绝氧气（如用锅盖盖灭、用灭火器）；（2）降低温度到可燃物的着火点以下（如用水灭火，水蒸发吸热使温度降低）；（3）清除可燃物或隔离可燃物（如开辟隔离带、关闭燃气阀门）。用水灭火时，水蒸发吸收大量热，使可燃物温度降低到着火点以下。森林火灾开辟隔离带是将可燃物与火源隔离开来。", "acceptAlso": ["降温到着火点以下|清除可燃物", "降低温度|清除可燃物", "降温|隔离可燃物", "降低温度到着火点以下|隔离可燃物", "降温到着火点以下|隔离可燃物"], "source": "AI出题"}]};

    const topicQuestions = QUESTIONS_BY_TOPIC[dist.topic] || [];

    if (dist.choice > 0) {
      const choices = topicQuestions.filter(function(q) { return q.type === 'choice'; });
      const selected = shuffle(choices).slice(0, dist.choice);
      selected.forEach(function(q) { paper.push(q); usedIds.add(q.id); });
    }

    if (dist.fill > 0) {
      const fills = topicQuestions.filter(function(q) { return q.type === 'fill'; });
      const selected = shuffle(fills).slice(0, dist.fill);
      selected.forEach(function(q) { paper.push(q); usedIds.add(q.id); });
    }
  });

  return shuffle(paper);
}

// ============================================================
// ERROR NOTEBOOK STORAGE
// ============================================================
function getNotebook() {
  try {
    return JSON.parse(localStorage.getItem('zk_nb_' + QUIZ_META.source) || '[]');
  } catch (e) { return []; }
}

function saveNotebook(nb) {
  localStorage.setItem('zk_nb_' + QUIZ_META.source, JSON.stringify(nb));
}

function addToNotebook(wrongResults) {
  const nb = getNotebook();
  const now = new Date().toISOString();
  wrongResults.forEach(function(r) {
    var existIdx = -1;
    for (var i = 0; i < nb.length; i++) {
      if (nb[i].topic === r.topic && nb[i].qId === r.id) { existIdx = i; break; }
    }
    var entry = {
      qId: r.id,
      subject: r.subject,
      topic: r.topic,
      text: r.text,
      type: r.type,
      options: r.options || null,
      studentAnswer: r.studentAnswer,
      correctAnswer: r.answer,
      explain: r.explain,
      wrongCount: 1,
      mastered: false,
      addedAt: now,
      updatedAt: now
    };
    if (existIdx >= 0) {
      entry.wrongCount = (nb[existIdx].wrongCount || 1) + 1;
      entry.addedAt = nb[existIdx].addedAt;
      nb[existIdx] = entry;
    } else {
      nb.push(entry);
    }
  });
  saveNotebook(nb);
  updateNotebookBadge();
}

function removeFromNotebook(idx) {
  const nb = getNotebook();
  nb.splice(idx, 1);
  saveNotebook(nb);
  updateNotebookBadge();
}

function toggleMastered(idx) {
  const nb = getNotebook();
  if (nb[idx]) {
    nb[idx].mastered = !nb[idx].mastered;
    nb[idx].updatedAt = new Date().toISOString();
    saveNotebook(nb);
  }
}

function updateNotebookBadge() {
  const nb = getNotebook();
  const unmastered = nb.filter(function(item) { return !item.mastered; }).length;
  const btn = document.getElementById('btnNotebook');
  const badge = document.getElementById('notebookBadge');
  if (unmastered > 0) {
    btn.style.display = 'inline-block';
    badge.textContent = unmastered;
  } else if (nb.length > 0) {
    btn.style.display = 'inline-block';
    badge.textContent = nb.length;
  } else {
    btn.style.display = 'none';
  }
}

function showNotebook() {
  document.getElementById('startPage').style.display = 'none';
  document.getElementById('notebookPage').classList.add('show');
  filterNotebook('all', document.querySelector('.nb-filter-btn'));
  renderMath();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function hideNotebook() {
  document.getElementById('notebookPage').classList.remove('show');
  document.getElementById('startPage').style.display = 'block';
  window.scrollTo({ top: 0 });
}

function filterNotebook(filter, btn) {
  document.querySelectorAll('.nb-filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');

  const nb = getNotebook();
  const list = document.getElementById('notebookList');
  list.innerHTML = '';

  var filtered = nb;
  if (filter === 'unmastered') filtered = nb.filter(function(item) { return !item.mastered; });
  else if (filter === 'mastered') filtered = nb.filter(function(item) { return item.mastered; });

  if (filtered.length === 0) {
    list.innerHTML = '<div class="notebook-empty"><div class="notebook-empty-icon">📫</div>暂无' +
      (filter === 'unmastered' ? '未掌握的' : filter === 'mastered' ? '已掌握的' : '') + '错题</div>';
    return;
  }

  filtered.forEach(function(item) {
    var realIdx = nb.indexOf(item);
    var div = document.createElement('div');
    div.className = 'nb-item' + (item.mastered ? ' mastered-item' : '');

    var dateStr = item.updatedAt ? new Date(item.updatedAt).toLocaleDateString('zh-CN') : '';
    var masteredLabel = item.mastered ? '已掌握' : '标记掌握';
    var masteredClass = item.mastered ? ' mastered' : '';

    div.innerHTML =
      '<div class="nb-item-header">' +
        '<div class="nb-item-meta">' + item.subject + ' · ' + item.topic + ' · 错' + (item.wrongCount || 1) + '次 · ' + dateStr + '</div>' +
        '<div class="nb-item-actions">' +
          '<button class="nb-btn' + masteredClass + '" onclick="doToggleMastered(' + realIdx + ')">' + masteredLabel + '</button>' +
          '<button class="nb-btn delete" onclick="doRemoveNotebook(' + realIdx + ')">移除</button>' +
        '</div>' +
      '</div>' +
      '<div class="nb-item-q">' + item.text + '</div>' +
      '<div class="nb-item-answer">你的答案：<span style="color:var(--error)">' + item.studentAnswer + '</span> 正确答案：<span style="color:var(--success)">' + item.correctAnswer + '</span></div>' +
      '<div class="nb-item-explain">' + item.explain + '</div>';
    list.appendChild(div);
  });

  renderMath();
}

function doToggleMastered(idx) {
  toggleMastered(idx);
  var activeBtn = document.querySelector('.nb-filter-btn.active');
  var filter = activeBtn.textContent.includes('未掌握') ? 'unmastered' :
               activeBtn.textContent.includes('已掌握') ? 'mastered' : 'all';
  filterNotebook(filter, activeBtn);
}

function doRemoveNotebook(idx) {
  if (confirm('确定从错题本中移除这道题吗？')) {
    removeFromNotebook(idx);
    var activeBtn = document.querySelector('.nb-filter-btn.active');
    var filter = activeBtn.textContent.includes('未掌握') ? 'unmastered' :
                 activeBtn.textContent.includes('已掌握') ? 'mastered' : 'all';
    filterNotebook(filter, activeBtn);
  }
}

function renderPaper() {
  currentPaper = generatePaper();
  currentQ = 0;
  answers = {};

  var container = document.getElementById('questionContainer');
  container.innerHTML = '';

  currentPaper.forEach(function(q, i) {
    var card = document.createElement('div');
    card.className = 'question-card' + (i === 0 ? ' active' : '');
    card.id = 'qcard-' + i;

    var diffLabel = { basic: '基础', medium: '中档', hard: '拔高' }[q.difficulty];
    var diffClass = q.difficulty;

    var html =
      '<div class="q-number">' +
        '<span class="q-badge">第 ' + (i + 1) + ' 题</span>' +
        '<span class="q-difficulty ' + diffClass + '">' + diffLabel + '</span>' +
        '<span class="q-subject">' + q.subject + ' · ' + q.topic + '</span>' +
      '</div>' +
      '<div class="q-text">' + q.text + '</div>';

    if (q.type === 'choice') {
      html += '<div class="options">';
      var letters = ['A', 'B', 'C', 'D'];
      q.options.forEach(function(opt, j) {
        html +=
          '<div class="option" data-q="' + i + '" data-val="' + letters[j] + '" onclick="selectOption(this, ' + i + ', \'' + letters[j] + '\")">" +
            '<span class="option-letter">' + letters[j] + '</span>' +
            '<span>' + opt + '</span>' +
          '</div>';
      });
      html += '</div>';
    } else if (q.type === 'fill') {
      html +=
        '<input class="fill-input" type="text" placeholder="输入你的答案"' +
        ' data-q="' + i + '" oninput="fillAnswer(' + i + ', this.value)">' +
        '<div class="fill-hint">填写后自动保存</div>';
    }

    card.innerHTML = html;
    container.appendChild(card);
  });

  var navDots = document.getElementById('navDots');
  navDots.innerHTML = '';
  currentPaper.forEach(function(_, i) {
    var dot = document.createElement('div');
    dot.className = 'nav-dot' + (i === 0 ? ' active' : '');
    dot.textContent = i + 1;
    dot.onclick = (function(idx) { return function() { goToQuestion(idx); }; })(i);
    navDots.appendChild(dot);
  });

  updateBottomBar();
}

function updateStartInfo() {
  var paper = generatePaper();

  var fc = paper.filter(function(q) { return q.type === 'fill'; }).length;

    '<span>科目：' + QUIZ_META.subject + '</span>' +
    '<span>题数：' + paper.length + ' 题（选择' + cc + ' + 填空' + fc + '）</span>' +
    '<span>用时：约 20-30 分钟</span>' +
    '<span>每次测试从' + totalQ + '题题库中随机抽取，覆盖' + totalT + '个知识点</span>' +
    '<span>完成后复制结果发送给教练即可自动分析</span>';
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(function() {
    elapsedSeconds++;
    var m = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
    var s = String(elapsedSeconds % 60).padStart(2, '0');
    document.getElementById('timer').textContent = m + ':' + s;
  }, 1000);
}

function selectOption(el, qIdx, val) {
  document.querySelectorAll('.option[data-q="' + qIdx + '"]').forEach(function(o) { o.classList.remove('selected'); });
  el.classList.add('selected');
  answers[qIdx] = val;
  updateNavDots();
  updateBottomBar();

  setTimeout(function() {
    if (currentQ < currentPaper.length - 1) nextQuestion();
  }, 300);
}

function fillAnswer(qIdx, val) {
  if (val.trim()) {
    answers[qIdx] = val.trim();
  } else {
    delete answers[qIdx];
  }
  updateNavDots();
  updateBottomBar();
}

function prevQuestion() {
  if (currentQ > 0) goToQuestion(currentQ - 1);
}

function nextQuestion() {
  if (currentQ < currentPaper.length - 1) goToQuestion(currentQ + 1);
}

function goToQuestion(idx) {
  document.getElementById('qcard-' + currentQ).classList.remove('active');
  document.getElementById('qcard-' + idx).classList.add('active');

  var dots = document.querySelectorAll('.nav-dot');
  dots[currentQ].classList.remove('active');
  dots[idx].classList.add('active');

  currentQ = idx;
  updateBottomBar();
  renderMath();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateNavDots() {
  var dots = document.querySelectorAll('.nav-dot');
  currentPaper.forEach(function(_, i) {
    dots[i].classList.remove('answered');
    if (answers[i] !== undefined) dots[i].classList.add('answered');
  });
}

function updateBottomBar() {
  var answered = Object.keys(answers).length;
  var total = currentPaper.length;
  document.getElementById('answerCount').textContent = '已答 ' + answered + '/' + total;
  document.getElementById('progressFill').style.width = (answered / total * 100) + '%';

  document.getElementById('btnPrev').disabled = currentQ === 0;
  document.getElementById('btnNext').style.display = currentQ === total - 1 ? 'none' : 'inline-block';

  var submitBtn = document.getElementById('btnSubmit');
  if (answered === total) {
    submitBtn.classList.add('show');
  } else {
    submitBtn.classList.remove('show');
  }
}

// ============================================================
// SUBMIT & RESULTS
// ============================================================
function submitQuiz() {
  var answered = Object.keys(answers).length;
  if (answered < currentPaper.length) {
    if (!confirm('还有 ' + (currentPaper.length - answered) + ' 题未作答，确定交卷吗？')) return;
  }

  quizSubmitted = true;
  clearInterval(timerInterval);

  var correctCount = 0;
  var results = currentPaper.map(function(q, i) {
    var studentAns = answers[i] || '未作答';
    var isCorrect = false;

    if (q.type === 'choice') {
      isCorrect = studentAns === q.answer;
    } else if (q.type === 'fill') {
      var normalized = studentAns.replace(/\s/g, '').toLowerCase();
      var correctNormalized = q.answer.replace(/\s/g, '').toLowerCase();
      isCorrect = normalized === correctNormalized;
      if (!isCorrect && q.acceptAlso) {
        isCorrect = q.acceptAlso.some(function(a) {
          return a.replace(/\s/g, '').toLowerCase() === normalized;
        });
      }
    }

    if (isCorrect) correctCount++;
    return {
      id: q.id, subject: q.subject, topic: q.topic, difficulty: q.difficulty,
      type: q.type, text: q.text, options: q.options, answer: q.answer,
      explain: q.explain, acceptAlso: q.acceptAlso,
      studentAnswer: studentAns, isCorrect: isCorrect
    };
  });

  var wrongResults = results.filter(function(r) { return !r.isCorrect; });
  if (wrongResults.length > 0) {
    addToNotebook(wrongResults);
  }

  showResults(results, correctCount);
}

function showResults(results, correctCount) {
  document.getElementById('quizPage').style.display = 'none';
  document.getElementById('resultsPage').classList.add('show');

  var total = currentPaper.length;
  var wrongCount = total - correctCount;
  var pct = Math.round(correctCount / total * 100);

  var circumference = 2 * Math.PI * 60;
  var offset = circumference * (1 - pct / 100);
  var ring = document.getElementById('scoreRing');
  var color = pct >= 80 ? 'var(--success)' : pct >= 60 ? 'var(--warning)' : 'var(--error)';
  ring.style.stroke = color;
  setTimeout(function() { ring.style.strokeDashoffset = offset; }, 100);

  document.getElementById('scoreNumber').textContent = pct + '%';
  document.getElementById('scoreNumber').style.color = color;

  var label = '';
  if (pct >= 90) label = '非常棒！继续保持 💪';
  else if (pct >= 70) label = '不错，还有提升空间';
  else if (pct >= 50) label = '基础需要加强，加油！';
  else label = '建议重新复习后再次测试';
  document.getElementById('scoreLabel').textContent = label;

  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  var m = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
  var s = String(elapsedSeconds % 60).padStart(2, '0');
  document.getElementById('statTime').textContent = m + ':' + s;

  renderDiagnosis(results);
  renderReviewList(results, 'all');

  window._quizResults = { results: results, correctCount: correctCount, wrongCount: wrongCount, pct: pct, elapsedSeconds: elapsedSeconds };

  renderMath();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderDiagnosis(results) {
  var list = document.getElementById('diagnosisList');
  list.innerHTML = '';

  var byTopic = {};
  results.forEach(function(r) {
    if (!byTopic[r.topic]) byTopic[r.topic] = { correct: 0, total: 0 };
    byTopic[r.topic].total++;
    if (r.isCorrect) byTopic[r.topic].correct++;
  });

  var topics = Object.keys(byTopic).sort(function(a, b) {
    return (byTopic[a].correct / byTopic[a].total) - (byTopic[b].correct / byTopic[b].total);
  });

  topics.forEach(function(topic) {
    var data = byTopic[topic];
    var accuracy = Math.round(data.correct / data.total * 100);
    var barColor = accuracy >= 80 ? 'var(--success)' : accuracy >= 50 ? 'var(--warning)' : 'var(--error)';

    var div = document.createElement('div');
    div.className = 'diagnosis-item';
    div.innerHTML =
      '<span class="diagnosis-topic">' + topic + '</span>' +
      '<div class="diagnosis-bar-wrap"><div class="diagnosis-bar" style="width:' + accuracy + '%;background:' + barColor + '"></div></div>' +
      '<span class="diagnosis-score" style="color:' + barColor + '">' + data.correct + '/' + data.total + '</span>';
    list.appendChild(div);
  });
}

function renderReviewList(results, filter) {
  var list = document.getElementById('reviewList');
  list.innerHTML = '';

  results.forEach(function(r, i) {
    if (filter === 'wrong' && r.isCorrect) return;

    var div = document.createElement('div');
    div.className = 'review-item ' + (r.isCorrect ? 'correct' : 'wrong');

    var statusIcon = r.isCorrect ? '✅' : '❌';
    var answerHtml = '';
    if (r.isCorrect) {
      answerHtml = '<div class="review-answer correct-text">' + statusIcon + ' 你的答案：' + r.studentAnswer + '</div>';
    } else {
      answerHtml = '<div class="review-answer wrong-text">' + statusIcon + ' 你的答案：' + r.studentAnswer + '</div>' +
        '<div class="review-answer correct-text" style="margin-top:4px">正确答案：' + r.answer + '</div>';
    }

    div.innerHTML =
      '<div class="review-q">第' + (i + 1) + '题 · ' + r.subject + ' · ' + r.topic + '</div>' +
      answerHtml +
      '<div class="review-explain">' + r.explain + '</div>';
    list.appendChild(div);
  });

  renderMath();
}

function toggleReview(filter, btn) {
  document.querySelectorAll('.review-toggle-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderReviewList(window._quizResults.results, filter);
}

// COPY RESULTS
// ============================================================
function copyResults() {
  var data = window._quizResults;
  var results = data.results;
  var correctCount = data.correctCount;
  var wrongCount = data.wrongCount;
  var pct = data.pct;
  var elapsedSeconds = data.elapsedSeconds;
  var m = String(Math.floor(elapsedSeconds / 60)).padStart(2, '0');
  var s = String(elapsedSeconds % 60).padStart(2, '0');
  var studentName = QUIZ_META.student || '未填写';

  var text = '【鞜山中考教练·测试报告】\n';
  text += '学生：' + studentName + '\n';
  text += '年级：' + QUIZ_META.grade + '\n';
  text += '科目：' + QUIZ_META.subject + '\n';
  text += '日期：' + QUIZ_META.date + '\n';
  text += '得分：' + correctCount + '/' + currentPaper.length + '（' + pct + '%）\n';
  text += '用时：' + m + ':' + s + '\n';
  text += '来源：' + QUIZ_META.source + '\n\n';

  text += '--- 逐题详情 ---\n';
  results.forEach(function(r, i) {
    var status = r.isCorrect ? '✓' : '✗';
    var diffLabel = { basic: '基础', medium: '中档', hard: '拔高' }[r.difficulty];
    text += '第' + (i + 1) + '题 [' + r.subject + '·' + r.topic + '·' + diffLabel + '] ' + status + '\n';
    text += '  学生答案：' + r.studentAnswer;
    if (!r.isCorrect) text += ' | 正确答案：' + r.answer;
    text += '\n';
  });

  var wrongByTopic = {};
  results.forEach(function(r) {
    if (!r.isCorrect) {
      if (!wrongByTopic[r.topic]) wrongByTopic[r.topic] = 0;
      wrongByTopic[r.topic]++;
    }
  });

  text += '\n--- 薄弱知识点 ---\n';
  var topics = Object.keys(wrongByTopic);
  if (topics.length > 0) {
    topics.sort(function(a, b) { return wrongByTopic[b] - wrongByTopic[a]; });
    topics.forEach(function(t) {
      text += t + '：错' + wrongByTopic[t] + '题\n';
    });
  } else {
    text += '无薄弱点，全部正确！\n';
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('已复制，请粘贴发送给教练');
    }).catch(function() {
      fallbackCopy(text);
    });
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    showToast('已复制，请粘贴发送给教练');
  } catch (e) {
    showToast('复制失败，请手动长按选择复制');
  }
  document.body.removeChild(ta);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

function retryQuiz() {
  clearInterval(timerInterval);
  elapsedSeconds = 0;
  currentQ = 0;
  answers = {};
  quizSubmitted = false;

  document.getElementById('resultsPage').classList.remove('show');

  var ring = document.getElementById('scoreRing');
  ring.style.strokeDashoffset = 377;

  document.getElementById('startPage').style.display = 'block';
  updateStartInfo();
  updateNotebookBadge();
  window.scrollTo({ top: 0 });
}

// ============================================================
// MATH RENDERING
// ============================================================
function renderMath() {
  if (window.renderMathInElement) {
    renderMathInElement(document.body, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false }
      ],
      throwOnError: false
    });
  }
}

document.addEventListener('DOMContentLoaded', function() {
  var check = setInterval(function() {
    if (window.renderMathInElement) {
      clearInterval(check);
      initQuiz();
    }
  }, 100);
  setTimeout(function() { if (!quizStarted) initQuiz(); }, 3000);
});
</script>
